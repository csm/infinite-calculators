name: Test

# Builds the app (wasm-pack + the two .cljrs bundles) and runs the Playwright
# e2e suite (test/e2e/, see package.json's test:e2e) against it on every pull
# request -- real browser, real wasm, no mocks except the LLM provider in
# generation.mjs (see proxy/providers/fake.mjs).
on:
  pull_request: {}
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: build/wasm-shell

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - run: npm ci

      - name: Build app (wasm-shell + cljrs bundles)
        run: npm run build

      - name: Install Playwright's Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e
